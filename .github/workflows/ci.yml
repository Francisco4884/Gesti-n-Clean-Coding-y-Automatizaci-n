name: CI Pipeline - EPN Event Manager

on:
  push:
    branches:
      - develop
      - main
      - feature/**
      - hotfix/**
  pull_request:
    branches:
      - develop
      - main

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        node-version: [20.x]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm

      - name: Install dependencies
        run: npm install

      - name: Run lint
        run: npm run lint
        continue-on-error: true

      - name: Build project
        run: npm run build

      - name: Run tests
        run: npm run test
        continue-on-error: true
